  <title>GIBS Brand &amp; Content Style Guide — Instructional Design</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #faf9f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #faf9f5; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en-ZA\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>GIBS Brand &amp; Content Style Guide — Instructional Design<\u002Ftitle>\n<style>/* ============================================================\n   GIBS Brand & Content Style Guide — for Instructional Design\n   ============================================================ */\n\n/* ── To embed the licensed primary typefaces for ALL viewers ──\n   1. Place the web fonts in  assets/fonts/  :\n        Jubilat-Light.woff2, Jubilat-Bold.woff2,\n        Metric-Regular.woff2, Metric-Semibold.woff2\n   2. Add four @font-face rules here, each pointing at the matching\n      file (weights 300/700 for Jubilat, 400/600 for Metric) with\n      font-display:swap.\n   Until then the guide renders in Arial — the GIBS secondary\n   typeface specified for digital applications. */\n\n/* ---- Design tokens ---- */\n:root {\n  /* Primary brand */\n  --blue: #002C77;\n  --blue-deep: #001B4A;\n  --black: #111317;\n  --white: #FFFFFF;\n\n  /* Programme palette (from CI guide) */\n  --green:  #326430;\n  --lime:   #9BB33B;\n  --maroon: #7B293D;\n  --red:    #9E191D;\n  --orange: #C9632F;\n  --yellow: #E4A024;\n  --purple: #5C2F6F;\n  --teal:   #007378;\n  --grey:   #A4A9A8;\n  --linen:  #E3D4B7;\n\n  /* Warm neutrals */\n  --paper:    #FAF7F1;\n  --paper-2:  #F2ECE1;\n  --card:     #FFFFFF;\n  --ink:      #20242C;\n  --ink-soft: #4A4F58;\n  --line:     #E4DCCF;\n  --line-2:   #EFE9DD;\n\n  /* States */\n  --do-bg:   #EEF4EC;\n  --do-line: #326430;\n  --no-bg:   #F7EAEA;\n  --no-line: #9E191D;\n\n  /* System */\n  --radius: 14px;\n  --radius-sm: 9px;\n  --shadow: 0 1px 2px rgba(20,20,30,.04), 0 8px 30px -14px rgba(0,44,119,.18);\n  --shadow-lg: 0 30px 70px -34px rgba(0,27,74,.42);\n  --maxw: 1080px;\n\n  /* ── GIBS typefaces ──────────────────────────────────────────\n     Primary: Jubilat (display) + Metric (body).\n     Secondary (digital fallback, per CI guide): Arial.\n     The stacks use the licensed fonts when installed/hosted, and\n     fall back to Arial — never to a non-brand web font.\n     To embed for all viewers, host the woff2 files and uncomment\n     the @font-face block above :root. */\n  --slab: \"Jubilat\", Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --sans: \"Metric\", Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n}\n\n* { box-sizing: border-box; }\n\n.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--sans);\n  color: var(--ink);\n  background: var(--paper);\n  line-height: 1.62;\n  font-size: 17px;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 { font-family: var(--slab); font-weight: 700; color: var(--blue); line-height: 1.12; margin: 0; letter-spacing: -0.01em; }\np { margin: 0 0 1em; max-width: 66ch; text-wrap: pretty; }\na { color: var(--blue); }\nstrong { font-weight: 700; }\n\n/* ============================================================\n   HEADER + TAB NAV\n   ============================================================ */\n.masthead {\n  background: var(--blue);\n  color: #fff;\n  position: relative;\n  overflow: hidden;\n}\n.masthead::after {\n  content: \"\";\n  position: absolute;\n  right: -120px; top: -140px;\n  width: 420px; height: 420px;\n  background: radial-gradient(circle at center, rgba(255,255,255,.08), transparent 70%);\n}\n.masthead-inner {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: 30px 32px 26px;\n  position: relative;\n  z-index: 1;\n}\n.brand-row { display: flex; align-items: center; gap: 16px; }\n.wordmark {\n  font-family: var(--slab);\n  font-weight: 700;\n  font-size: 30px;\n  letter-spacing: 0.04em;\n  color: #fff;\n  line-height: 1;\n}\n.wordmark .div { display: block; font-family: var(--sans); font-weight: 500; font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.62); margin-top: 6px; }\n.brand-tag {\n  margin-left: auto;\n  font-size: 13px;\n  color: rgba(255,255,255,.7);\n  text-align: right;\n  font-weight: 500;\n}\n.brand-tag b { color: var(--lime); font-weight: 600; }\n.masthead h1 {\n  color: #fff;\n  font-size: clamp(30px, 4.6vw, 50px);\n  margin: 22px 0 10px;\n  max-width: 18ch;\n}\n.masthead .lede {\n  color: rgba(255,255,255,.82);\n  font-size: 17.5px;\n  max-width: 60ch;\n  margin: 0;\n}\n\n/* Sticky tabs */\n.tabbar-wrap { position: sticky; top: 0; z-index: 50; background: var(--paper); border-bottom: 1px solid var(--line); }\n.tabbar {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: 0 18px;\n  display: flex;\n  gap: 2px;\n  overflow-x: auto;\n  scrollbar-width: none;\n}\n.tabbar::-webkit-scrollbar { display: none; }\n.tab {\n  appearance: none;\n  border: 0;\n  background: none;\n  font-family: var(--sans);\n  font-size: 14.5px;\n  font-weight: 600;\n  color: var(--ink-soft);\n  padding: 16px 16px 13px;\n  cursor: pointer;\n  white-space: nowrap;\n  border-bottom: 3px solid transparent;\n  transition: color .15s, border-color .15s;\n}\n.tab:hover { color: var(--blue); }\n.tab[aria-selected=\"true\"] { color: var(--blue); border-bottom-color: var(--blue); }\n.tab .num { font-family: var(--mono); font-size: 11px; color: var(--grey); margin-right: 7px; }\n\n/* ============================================================\n   LAYOUT\n   ============================================================ */\nmain { max-width: var(--maxw); margin: 0 auto; padding: 0 32px 120px; }\n.panel { display: none; padding-top: 46px; }\n.panel.active { display: block; }\n@media (prefers-reduced-motion: no-preference) {\n  .panel.active { animation: fade .35s ease; }\n}\n@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--orange);\n  font-weight: 500;\n  margin-bottom: 12px;\n}\n.panel > h2 { font-size: clamp(26px, 3.4vw, 38px); margin-bottom: 14px; }\n.panel > .intro { font-size: 18.5px; color: var(--ink-soft); max-width: 64ch; margin-bottom: 8px; }\n\n.section { margin-top: 54px; }\n.section > h3 { font-size: 23px; margin-bottom: 6px; display: flex; align-items: center; gap: 11px; }\n.section > h3 .dot { width: 11px; height: 11px; border-radius: 3px; flex: none; }\n.section > .sub { color: var(--ink-soft); margin: 0 0 22px; max-width: 62ch; }\n\nhr.rule { border: 0; border-top: 1px solid var(--line); margin: 64px 0 0; }\n\n/* Cards */\n.card {\n  background: var(--card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 26px 28px;\n  box-shadow: var(--shadow);\n}\n.grid { display: grid; gap: 18px; }\n.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }\n.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }\n.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }\n@media (max-width: 820px) { .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; } }\n\n/* Commitment cards (overview) */\n.commit { display: flex; flex-direction: column; gap: 8px; border-top: 4px solid var(--blue); }\n.commit .k { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--grey); }\n.commit h4 { font-size: 20px; }\n.commit p { font-size: 15px; color: var(--ink-soft); margin: 0; }\n\n/* Do / Don't */\n.dd { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n@media (max-width: 760px) { .dd { grid-template-columns: 1fr; } }\n.dd-card { border-radius: var(--radius-sm); padding: 20px 22px; border: 1px solid; }\n.dd-card.do  { background: var(--do-bg); border-color: #cfe0c8; }\n.dd-card.no  { background: var(--no-bg); border-color: #e  font-weight: 600; }\nmark.sp-style { background: #fbeed6; color: #97600f; border-bottom: 2px dotted #C9632F; border-radius: 3px; padding: 0 3px; }\n.fixlist { list-style: none; padding: 0; margin: 16px 0 0; display: grid; gap: 9px; }\n.fixlist li { display: flex; gap: 11px; align-items: center; font-size: 15px; background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 9px 14px; flex-wrap: wrap; }\n.fixlist .from { color: #9E191D; text-decoration: line-through; font-weight: 600; }\n.fixlist .arrow { color: var(--grey); }\n.fixlist .to { color: var(--do-line); font-weight: 700; }\n.fixlist .why { color: var(--ink-soft); font-size: 13px; }\n.fixlist.style .from { color: #97600f; text-decoration: none; font-style: italic; }\n.fixlist.style .to { color: var(--orange); }\n.legend { display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px; color: var(--ink-soft); margin-top: 14px; }\n.legend span { display: inline-flex; align-items: center; gap: 7px; }\n.legend i { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }\n\n/* Idea generator */\n.seg { display: flex; flex-wrap: wrap; gap: 8px; }\n.seg .opt { font-family: var(--sans); font-weight: 600; font-size: 13.5px; background: var(--paper); border: 1.5px solid var(--line); color: var(--ink-soft); border-radius: 999px; padding: 9px 16px; cursor: pointer; transition: all .14s; }\n.seg .opt:hover { border-color: var(--blue); color: var(--blue); }\n.seg .opt[aria-pressed=\"true\"] { background: var(--blue); border-color: var(--blue); color: #fff; }\n.gen-controls { display: grid; grid-template-columns: 1fr 220px; gap: 22px; align-items: end; margin-top: 18px; }\n@media (max-width: 720px) { .gen-controls { grid-template-columns: 1fr; } }\n\n.idea-card { border: 1px solid var(--line); border-left: 6px solid var(--purple); border-radius: 12px; padding: 24px 26px; background: #fff; box-shadow: var(--shadow); margin-top: 22px; }\n.idea-card .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; }\n.idea-card h4 { font-size: 24px; margin-bottom: 6px; }\n.idea-card > p.what { font-size: 16px; color: var(--ink); margin: 0 0 4px; max-width: 62ch; }\n.idea-sec { margin-top: 18px; }\n.idea-sec .lab { font-weight: 700; font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }\n.idea-sec .lab::before { content: \"\"; width: 7px; height: 7px; border-radius: 2px; background: var(--purple); }\n.udl-tags { display: flex; flex-wrap: wrap; gap: 7px; }\n.udl-tags .ut { font-size: 12.5px; font-weight: 600; padding: 4px 12px; border-radius: 999px; }\n.ut.rep { background: color-mix(in srgb, var(--blue) 12%, #fff); color: var(--blue); }\n.ut.eng { background: color-mix(in srgb, var(--teal) 14%, #fff); color: var(--teal); }\n.ut.act { background: color-mix(in srgb, var(--purple) 14%, #fff); color: var(--purple); }\n.wcag-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 9px; }\n.wcag-list li { display: grid; grid-template-columns: 22px 1fr; gap: 10px; font-size: 14.5px; color: var(--ink); }\n.wcag-list .bx { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--green); color: var(--green); display: grid; place-items: center; font-size: 12px; font-weight: 700; margin-top: 1px; }\n.idea-tip { margin-top: 18px; background: var(--paper); border-radius: 10px; padding: 14px 16px; font-size: 14.5px; color: var(--ink); border: 1px dashed var(--line); }\n.idea-tip b { color: var(--orange); }\n\n/* ===== Team notes (per-tab sticky notes) ===== */\n.notes-fab { position: fixed; right: 22px; bottom: 22px; z-index: 120; background: var(--blue); color: #fff; border: 0; border-radius: 999px; padding: 13px 20px; font-family: var(--sans); font-weight: 600; font-size: 14.5px; cursor: pointer; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 9px; }\n.notes-fab:hover { background: var(--blue-deep); }\n.notes-fab[hidden] { display: none; }\n.notes-count { background: var(--orange); color: #fff; border-radius: 999px; min-width: 20px; height: 20px; padding: 0 6px; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }\n.notes-count[hidden] { display: none; }\n.notes-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 390px; max-width: 92vw; background: #fff; z-index: 130; box-shadow: -20px 0 60px -30px rgba(0,27,74,.5); display: flex; flex-direction: column; }\n.notes-drawer[hidden] { display: none; }\n.notes-hd { background: var(--blue); color: #fff; padding: 18px 20px; display: flex; align-items: center; gap: 12px; }\n.notes-title { font-family: var(--slab); font-weight: 700; font-size: 18px; }\n.notes-sub { font-size: 12.5px; color: rgba(255,255,255,.72); margin-top: 2px; }\n.notes-list { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; background: var(--paper); }\n.notes-empty { color: var(--ink-soft); font-size: 14px; line-height: 1.6; }\n.note { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--c, var(--blue)); border-radius: 10px; padding: 12px 14px; }\n.note.resolved { opacity: .55; }\n.note .note-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }\n.note .note-name { font-weight: 700; font-size: 13.5px; color: var(--ink); }\n.note .note-kind { font-family: var(--mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }\n.note-kind.suggestion { background: color-mix(in srgb, var(--green) 14%, #fff); color: var(--green); }\n.note-kind.question { background: color-mix(in srgb, var(--blue) 12%, #fff); color: var(--blue); }\n.note .note-time { margin-left: auto; font-size: 11px; color: var(--grey); }\n.note .note-text { font-size: 14.5px; color: var(--ink); white-space: pre-wrap; line-height: 1.55; }\n.note .note-tools { display: flex; gap: 14px; margin-top: 9px; }\n.note .note-tools button { background: none; border: 0; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--blue); padding: 0; }\n.note .note-tools button:hover { text-decoration: underline; }\n.notes-form { border-top: 1px solid var(--line); padding: 14px 20px; display: flex; flex-direction: column; gap: 9px; background: #fff; }\n.notes-row { display: grid; grid-template-columns: 1fr 132px; gap: 9px; }\n.notes-form .t-input, .notes-form .t-area, .notes-form .t-select { font-size: 14px; }\n.notes-form .t-area { min-height: 68px; }\n.notes-actions { display: flex; align-items: center; gap: 12px; }\n#note-msg { font-size: 12.5px; }\n#note-msg.err { color: var(--no-line); }\n#note-msg.ok { color: var(--do-line); }\n\n/* ===== Blackboard native callout cards ===== */\n.bb-callout { background: #fff; border: 1px solid var(--line); border-left: 7px solid var(--c, var(--blue)); border-radius: 10px; padding: 16px 20px; }\n.bb-callout .bb-tag { font-weight: 700; font-size: 16px; color: var(--c, var(--blue)); margin-bottom: 5px; }\n.bb-callout p { font-size: 14.5px; color: var(--ink); margin: 0 0 9px; }\n.bb-callout .bb-meta { font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--grey); }\n\n/* ===== Copyable code block ===== */\n.codewrap { margin-top: 16px; }\n.codebar { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #141b2b; border-radius: 10px 10px 0 0; padding: 9px 14px; border-bottom: 1px solid #2a3550; }\n.codebar span { font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #7f8db0; }\n.btn-copy { font-family: var(--sans); font-weight: 600; font-size: 12.5px; background: transparent; color: #cdd6ec; border: 1px solid #2a3550; border-radius: 7px; padding: 5px 13px; cursor: pointer; white-space: nowrap; }\n.btn-copy:hover { background: #1f2740; color: #fff; }\n.btn-copy.copied { color: #9bd6a6; border-color: var(--green); }\n.codewrap .spec { margin: 0; border-radius: 0 0 10px 10px; }\n.subhead-min { font-size: 16px; margin: 6px 0 12px; color: var(--ink); font-family: var(--slab); font-weight: 700; }\n\n/* ===== Approved-word register ===== */\n.aw-add { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-top: 16px; }\n@media (max-width: 720px) { .aw-add { grid-template-columns: 1fr; } }\n.aw-add .t-input { font-size: 14px; }\n.aw-del { background: none; border: 0; color: var(--no-line); cursor: pointer; font-size: 19px; line-height: 1; padding: 0 4px; }\n.aw-del:hover { color: #6b1a1e; }\n#aw-table .pref { font-weight: 700; color: var(--do-line); }\n#aw-table .avoid { color: var(--ink-soft); text-decoration: line-through; }\nmark.sp-house { background: #e4ecf8; color: #002C77; border-bottom: 2px dotted #2A6FDB; border-radius: 3px; padding: 0 3px; }\n.fixlist.house .from { color: var(--ink-soft); text-decoration: line-through; }\n.fixlist.house .to { color: var(--blue); }\n\n/* ===== AI build-prompt pop-out (modal) ===== */\n.modal-backdrop { position: fixed; inset: 0; background: rgba(0,27,74,.55); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 200; }\n.modal-backdrop[hidden] { display: none; }\n.modal { background: #fff; border-radius: 16px; max-width: 720px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); overflow: hidden; }\n.modal > header { background: var(--blue); color: #fff; padding: 18px 22px; display: flex; align-items: center; gap: 14px; }\n.modal > header h3 { color: #fff; font-size: 19px; line-height: 1.2; }\n.modal > header .pm-sub { display: block; font-family: var(--sans); font-weight: 400; font-size: 12.5px; color: rgba(255,255,255,.72); margin-top: 2px; }\n.modal-x { margin-left: auto; flex: none; background: rgba(255,255,255,.16); border: 0; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 20px; line-height: 1; cursor: pointer; }\n.modal-x:hover { background: rgba(255,255,255,.3); }\n.modal-body { padding: 22px; overflow-y: auto; }\n.modal-body .muted { color: var(--ink-soft); font-size: 14.5px; margin: 0 0 16px; }\n#pm-text { width: 100%; min-height: 280px; font-family: var(--mono); font-size: 12.5px; line-height: 1.65; border: 1.5px solid var(--line); border-radius: 10px; padding: 14px 16px; background: var(--paper); color: var(--ink); resize: vertical; white-space: pre-wrap; }\n#pm-text:focus { outline: 0; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,44,119,.12); }\n.pm-note { margin-top: 14px; font-size: 13.5px; color: var(--ink-soft); background: var(--paper); border: 1px dashed var(--line); border-radius: 9px; padding: 12px 14px; }\n.pm-note b { color: var(--blue); }\n#pm-copied { color: var(--do-line); font-weight: 700; font-size: 13.5px; opacity: 0; transition: opacity .2s; }\n#pm-copied.show { opacity: 1; }\n.idea-prompt-btn { background: var(--purple) !important; border-color: var(--purple) !important; color: #fff !important; }\n.idea-prompt-btn:hover { background: #4a2559 !important; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============ MASTHEAD ============ -->\n<header class=\"masthead\">\n  <div class=\"masthead-inner\">\n    <div class=\"brand-row\">\n      <div class=\"wordmark\">GIBS<span class=\"div\">Gordon Institute of Business Science<\u002Fspan><\u002Fdiv>\n      <div class=\"brand-tag\">Globally accredited, <b>proudly African.<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <h1>Brand &amp; Content Style Guide<\u002Fh1>\n    <p class=\"lede\">A working reference for the Instructional Design team — so every asset we build, from a callout box to an HTML interactive, sounds like GIBS, looks like GIBS, and works for every learner.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ TAB BAR ============ -->\n<div class=\"tabbar-wrap\">\n  <nav class=\"tabbar\" role=\"tablist\" aria-label=\"Style guide sections\">\n    <button class=\"tab\" role=\"tab\" id=\"t-overview\" aria-controls=\"p-overview\" aria-selected=\"true\"><span class=\"num\">01<\u002Fspan>Overview<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-voice\" aria-controls=\"p-voice\" aria-selected=\"false\"><span class=\"num\">02<\u002Fspan>Voice &amp; Tone<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-writing\" aria-controls=\"p-writing\" aria-selected=\"false\"><span class=\"num\">03<\u002Fspan>Writing<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-brand\" aria-controls=\"p-brand\" aria-selected=\"false\"><span class=\"num\">04<\u002Fspan>Colour &amp; Type<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-components\" aria-controls=\"p-components\" aria-selected=\"false\"><span class=\"num\">05<\u002Fspan>Components<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-access\" aria-controls=\"p-access\" aria-selected=\"false\"><span class=\"num\">06<\u002Fspan>Accessibility<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-ai\" aria-controls=\"p-ai\" aria-selected=\"false\"><span class=\"num\">07<\u002Fspan>AI Assistant<\u002Fbutton>\n    <button class=\"tab\" role=\"tab\" id=\"t-toolkit\" aria-controls=\"p-toolkit\" aria-selected=\"false\"><span class=\"num\">08<\u002Fspan>Toolkit<\u002Fbutton>\n  <\u002Fnav>\n<\u002Fdiv>\n\n<main>\n\n<!-- ============================================================\n     01 · OVERVIEW\n     ============================================================ -->\n<section class=\"panel active\" id=\"p-overview\" role=\"tabpanel\" aria-labelledby=\"t-overview\">\n  <div class=\"eyebrow\">For the Instructional Design team<\u002Fdiv>\n  <h2>How we build, written down.<\u002Fh2>\n  <p class=\"intro\">This guide keeps our course assets consistent and accessible. When you're not sure how to write a callout, size an image, structure a module, or phrase a learning outcome — start here. It's a living document; if a rule is missing or wrong, flag it.<\u002Fp>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>The four commitments<\u002Fh3>\n    <p class=\"sub\">Every asset we generate should be able to answer \"yes\" to all four. They're the reason this guide exists.<\u002Fp>\n    <div class=\"grid cols-4\">\n      <div class=\"card commit\" style=\"border-top-color:var(--blue)\">\n        <span class=\"k\">01 — Consistency<\u002Fspan>\n        <h4>On brand<\u002Fh4>\n        <p>One visual and verbal language across every course, so learners always know they're at GIBS.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card commit\" style=\"border-top-color:var(--teal)\">\n        <span class=\"k\">02 — UDL<\u002Fspan>\n        <h4>Designed for all<\u002Fh4>\n        <p>Universal Design for Learning: multiple ways to access, engage with, and act on content.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card commit\" style=\"border-top-color:var(--green)\">\n        <span class=\"k\">03 — WCAG<\u002Fspan>\n        <h4>Accessible by default<\u002Fh4>\n        <p>Meets WCAG 2.1 AA — contrast, alt text, keyboard, captions. Not an extra step; the baseline.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card commit\" style=\"border-top-color:var(--orange)\">\n        <span class=\"k\">04 — Structure<\u002Fspan>\n        <h4>Cohesive courses<\u002Fh4>\n        <p>A predictable module rhythm so learners can navigate any course without relearning the layout.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--lime)\"><\u002Fspan>The golden rules<\u002Fh3>\n    <p class=\"sub\">If you remember nothing else, remember these.<\u002Fp>\n    <ul class=\"check-list\">\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Write warm and human, one consistent voice.<\u002Fb> Speak to one learner, plainly, as a knowledgeable colleague would.<span class=\"d\">Same register everywhere — academic content and interactive prompts alike.<\u002Fspan><\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Make it easy to act on.<\u002Fb> Short sentences, clear steps, obvious next actions. If a learner can't tell what to do, rewrite it.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Accessible or it doesn't ship.<\u002Fb> Alt text, captions, 4.5:1 contrast, logical headings, keyboard-operable interactives.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Use the system, don't reinvent it.<\u002Fb> Brand colours, the type scale, the component patterns in this guide. Consistent beats clever.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>UK / South African English.<\u002Fb> organi<b>s<\u002Fb>e, programme, colour, centre, -ise endings.<\u002Fdiv><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--red)\"><\u002Fspan>Quick \"do not\" list<\u002Fh3>\n    <p class=\"sub\">The tells we never want to see in a GIBS course. Each gets full treatment in the relevant tab.<\u002Fp>\n    <div class=\"tags\">\n      <span class=\"pill\">✕ walls of text<\u002Fspan>\n      <span class=\"pill\">✕ jargon &amp; academic waffle<\u002Fspan>\n      <span class=\"pill\">✕ passive voice<\u002Fspan>\n      <span class=\"pill\">✕ \"delve / unlock / elevate / leverage\"<\u002Fspan>\n      <span class=\"pill\">✕ \"in today's fast-paced world\"<\u002Fspan>\n      <span class=\"pill\">✕ em-dash overload<\u002Fspan>\n      <span class=\"pill\">✕ vague instructions<\u002Fspan>\n      <span class=\"pill\">✕ poor contrast / missing alt text<\u002Fspan>\n      <span class=\"pill\">✕ emoji &amp; exclamation overload<\u002Fspan>\n      <span class=\"pill\">✕ Title Case on in-page headings &amp; body<\u002Fspan>\n      <span class=\"pill\">✕ inconsistent image sizes<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     02 · VOICE & TONE\n     ============================================================ -->\n<section class=\"panel\" id=\"p-voice\" role=\"tabpanel\" aria-labelledby=\"t-voice\">\n  <div class=\"eyebrow\">How GIBS sounds<\u002Fdiv>\n  <h2>Warm, human, and one voice throughout.<\u002Fh2>\n  <p class=\"intro\">Our learners are capable, busy professionals. We write to them as a sharp, generous colleague would — confident in the substance, warm in the delivery. The same voice carries from a module introduction to a flip-card prompt.<\u002Fp>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--teal)\"><\u002Fspan>The mission underneath the words<\u002Fh3>\n    <p class=\"sub\">Every asset, however small, is in service of this.<\u002Fp>\n    <div class=\"card\">\n      <div class=\"pquote\">\n        <p class=\"q\">We significantly improve responsible individual and organisational performance — proudly African, globally relevant.<\u002Fp>\n        <div class=\"cite\">GIBS purpose<span>The thread that should run beneath every course we design.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>Voice traits<\u002Fh3>\n    <p class=\"sub\">Five qualities. Hold them in tension — warm <em>and<\u002Fem> credible, plain <em>and<\u002Fem> rigorous.<\u002Fp>\n    <div class=\"grid cols-3\">\n      <div class=\"card\"><h4 style=\"font-size:18px\">Warm &amp; human<\u002Fh4><p style=\"font-size:15px;color:var(--ink-soft);margin:0\">Speak to one person. Use \"you\". Sound like a real colleague, never a policy document.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><h4 style=\"font-size:18px\">Clear &amp; direct<\u002Fh4><p style=\"font-size:15px;color:var(--ink-soft);margin:0\">Lead with the point. Short sentences. Plain words over impressive ones.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><h4 style=\"font-size:18px\">Credible<\u002Fh4><p style=\"font-size:15px;color:var(--ink-soft);margin:0\">Rigorous and accurate. Warmth never means dumbing the substance down.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><h4 style=\"font-size:18px\">Encouraging<\u002Fh4><p style=\"font-size:15px;color:var(--ink-soft);margin:0\">Assume capability. Guide, don't lecture. Make the next step feel achievable.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><h4 style=\"font-size:18px\">Proudly African<\u002Fh4><p style=\"font-size:15px;color:var(--ink-soft);margin:0\">Local context and examples, globally relevant insight. Our point of view.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--green)\"><\u002Fspan>Voice in practice<\u002Fh3>\n    <p class=\"sub\">Same meaning, right register.<\u002Fp>\n    <div class=\"dd\">\n      <div class=\"dd-card no\">\n        <div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Off voice<\u002Fdiv>\n        <p class=\"ex muted\">\"It is imperative that participants leverage the aforementioned frameworks to optimise organisational synergies in today's fast-paced business landscape.\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"dd-card do\">\n        <div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>On voice<\u002Fdiv>\n        <p class=\"ex\">\"Use these three frameworks to find where your team is duplicating effort — and where it's missing it.\"<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dd\" style=\"margin-top:18px\">\n      <div class=\"dd-card no\">\n        <div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Off voice<\u002Fdiv>\n        <p class=\"ex muted\">\"Learners are required to complete the assessment.\" <br><em style=\"font-size:13px\">Cold, passive, institutional.<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"dd-card do\">\n        <div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>On voice<\u002Fdiv>\n        <p class=\"ex\">\"You'll finish this module with a short scenario to apply what you've learned. It takes about ten minutes.\"<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--orange)\"><\u002Fspan>Tone holds steady<\u002Fh3>\n    <p class=\"sub\">We chose one consistent tone — don't swing formal for theory and chatty for activities.<\u002Fp>\n    <div class=\"callout reflect\">\n      <div class=\"glyph\">i<\u002Fdiv>\n      <div class=\"body\"><div class=\"ttl\">One register, calibrated<\u002Fdiv><p>Stay warm and plain throughout. The <em>energy<\u002Fem> can lift slightly for prompts and encouragement, but the voice never changes character. No corporate stiffness in the lectures; no over-familiar slang in the activities.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     03 · WRITING\n     ============================================================ -->\n<section class=\"panel\" id=\"p-writing\" role=\"tabpanel\" aria-labelledby=\"t-writing\">\n  <div class=\"eyebrow\">Plain language mechanics<\u002Fdiv>\n  <h2>Writing learners can act on.<\u002Fh2>\n  <p class=\"intro\">Plain language is an accessibility feature, not a downgrade. These rules make content faster to read, easier to translate into action, and consistent across every course.<\u002Fp>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>Core writing rules<\u002Fh3>\n    <ul class=\"check-list\">\n      <li><span class=\"box\">✓<\u002Fspan><div><b>One idea per paragraph; 2–4 sentences.<\u002Fb> Break up anything longer. White space is a feature.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Active voice.<\u002Fb> \"Review the case study\" — not \"the case study should be reviewed\".<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Front-load the point.<\u002Fb> Say what matters in the first sentence, then explain.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Plain words.<\u002Fb> \"use\" not \"utilise\", \"help\" not \"facilitate\", \"about\" not \"with regard to\".<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Define terms once, then stay consistent.<\u002Fb> Don't call it a \"module\" here and a \"unit\" there.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Capitalise by role, not by habit.<\u002Fb> Title Case for course, module and page titles; sentence case for in-page headings and body. See the convention below.<\u002Fdiv><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--teal)\"><\u002Fspan>Capitalisation convention<\u002Fh3>\n    <p class=\"sub\">A consistent, defensible rule for Blackboard Ultra courses — grounded in WCAG heading clarity (2.4.6), UDL readability, and recognised style terminology.<\u002Fp>\n\n    <div class=\"callout key\" style=\"margin-bottom:20px\">\n      <div class=\"glyph\">★<\u002Fdiv>\n      <div class=\"body\"><div class=\"ttl\">The rule<\u002Fdiv><p>Use <b>Title Case<\u002Fb> for formal course and page identifiers — course banners, learning modules, page titles and Blackboard's <b>Title<\u002Fb> style. Use <b>sentence case<\u002Fb> for the instructional hierarchy inside a page — <b>Header<\u002Fb>, <b>Subheader<\u002Fb> and <b>Paragraph<\u002Fb>.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <table class=\"gibs\">\n      <caption>Capitalisation by course element (Blackboard Ultra).<\u002Fcaption>\n      <thead><tr><th scope=\"col\">Course element<\u002Fth><th scope=\"col\">Blackboard style<\u002Fth><th scope=\"col\">Case<\u002Fth><th scope=\"col\">Example<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Course banner<\u002Ftd><td>Programme-level title<\u002Ftd><td><b>Title Case<\u002Fb><\u002Ftd><td>Business Finance for Managers (PMD 71 Online 2026)<\u002Ftd><\u002Ftr>\n        <tr><td>Learning module<\u002Ftd><td>Major container<\u002Ftd><td><b>Title Case<\u002Fb><\u002Ftd><td>Course Introduction<\u002Ftd><\u002Ftr>\n        <tr><td>Page title<\u002Ftd><td>Content item title<\u002Ftd><td><b>Title Case<\u002Fb><\u002Ftd><td>Welcome to Business Finance for Managers<\u002Ftd><\u002Ftr>\n        <tr><td>In-page title<\u002Ftd><td>Title (H1) style<\u002Ftd><td><b>Title Case<\u002Fb><\u002Ftd><td>Understanding Financial Statements<\u002Ftd><\u002Ftr>\n        <tr><td>Header<\u002Ftd><td>Header (H2) style<\u002Ftd><td>Sentence case<\u002Ftd><td>What you need to know before you begin<\u002Ftd><\u002Ftr>\n        <tr><td>Subheader<\u002Ftd><td>Subheader (H3) style<\u002Ftd><td>Sentence case<\u002Ftd><td>Apply this concept to your workplace<\u002Ftd><\u002Ftr>\n        <tr><td>Paragraph<\u002Ftd><td>Body text<\u002Ftd><td>Sentence case<\u002Ftd><td>Welcome to this learning activity.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"callout warn\" style=\"margin-top:20px\">\n      <div class=\"glyph\">!<\u002Fdiv>\n      <div class=\"body\"><div class=\"ttl\">Use the levels in order — not by looks<\u002Fdiv><p>Choose Title, Header or Subheader for what it <em>is<\u002Fem> in the structure, never for how it looks: <b>Title → Header → Subheader → Paragraph<\u002Fb>. Don't skip a level (for example, Title straight to Subheader). Screen-reader and keyboard users navigate by this structure.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"sub\" style=\"margin-top:18px\">Say “<b>Title Case<\u002Fb>” and “<b>sentence case<\u002Fb>” — avoid “Capital Case”, which gets misread as ALL CAPS. “GIBS” is always all caps; use <b>bold<\u002Fb> for emphasis, never ALL CAPS.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--orange)\"><\u002Fspan>Numbers &amp; currency<\u002Fh3>\n    <p class=\"sub\">Based on APA-style number usage, adapted for South African / British formatting. Numerals scan faster in instructions, rubrics and LMS navigation — so learning-design values lean numeric.<\u002Fp>\n\n    <div class=\"callout key\" style=\"margin-bottom:20px\">\n      <div class=\"glyph\">★<\u002Fdiv>\n      <div class=\"body\"><div class=\"ttl\">The rule<\u002Fdiv><p>Spell out <b>one to nine<\u002Fb> in general prose; use numerals for <b>10 and above<\u002Fb>. Always use numerals for measurements, marks, percentages, dates, times, ages, numbered steps, module/topic numbers and currency. For rand, put the symbol before the number and use a <b>space<\u002Fb> as the thousands separator: <b>R100 000<\u002Fb>, not R100,000.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <table class=\"gibs\">\n      <caption>Numbers &amp; currency by use case.<\u002Fcaption>\n      <thead><tr><th scope=\"col\">Use case<\u002Fth><th scope=\"col\">Convention<\u002Fth><th scope=\"col\">Example<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>General, one to nine<\u002Ftd><td>Words<\u002Ftd><td>Complete <b>three<\u002Fb> activities.<\u002Ftd><\u002Ftr>\n        <tr><td>General, 10 and above<\u002Ftd><td>Numerals<\u002Ftd><td>Complete <b>10<\u002Fb> activities.<\u002Ftd><\u002Ftr>\n        <tr><td>Marks, %, time, measurements<\u002Ftd><td>Numerals<\u002Ftd><td>5 marks · 8% · 3 hours · 7 days<\u002Ftd><\u002Ftr>\n        <tr><td>Steps &amp; sequences<\u002Ftd><td>Numerals<\u002Ftd><td>Step 1 · Module 2 · Topic 3<\u002Ftd><\u002Ftr>\n        <tr><td>Money (rand)<\u002Ftd><td>Symbol + space<\u002Ftd><td>R100 000<\u002Ftd><\u002Ftr>\n        <tr><td>Millions<\u002Ftd><td>Numeral + “million”<\u002Ftd><td>R4 million<\u002Ftd><\u002Ftr>\n        <tr><td>Adjectival money phrase<\u002Ftd><td>Hyphenate<\u002Ftd><td>a R4-million deal<\u002Ftd><\u002Ftr>\n        <tr><td>Thousands separator<\u002Ftd><td>Space, not comma<\u002Ftd><td>25 000 learners<\u002Ftd><\u002Ftr>\n        <tr><td>Decimals<\u002Ftd><td>Comma decimal<\u002Ftd><td>3,5 hours · R99,95<\u002Ftd><\u002Ftr>\n        <tr><td>Start of a sentence<\u002Ftd><td>Spell out or rewrite<\u002Ftd><td>Twenty learners… / A total of 20 learners…<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"callout warn\" style=\"margin-top:20px\">\n      <div class=\"glyph\">!<\u002Fdiv>\n      <div class=\"body\"><div class=\"ttl\">Below 10? Still use numerals when it's a value<\u002Fdiv><p>Use figures for any measurement, mark, percentage, date, time, age, step or sequence — even under 10: <b>3 attempts<\u002Fb>, <b>5 marks<\u002Fb>, <b>2 hours<\u002Fb>, <b>5 pm<\u002Fb>, <b>Topic 4<\u002Fb>, <b>7 out of 10<\u002Fb>.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"dd\" style=\"margin-top:20px\">\n      <div class=\"dd-card do\"><div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>Do<\u002Fdiv><p class=\"ex\">This assessment is worth <b>30 marks<\u002Fb>. You'll complete <b>three<\u002Fb> reflection activities and <b>10<\u002Fb> questions. The budget is <b>R100 000<\u002Fb>; revenue was <b>R4 million<\u002Fb>.<\u002Fp><\u002Fdiv>\n      <div class=\"dd-card no\"><div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Don't<\u002Fdiv><p class=\"ex muted\">This assessment is worth <b>thirty marks<\u002Fb>. You'll complete <b>3<\u002Fb> reflection activities. The budget is <b>R100,000<\u002Fb>; revenue was <b>R4-million<\u002Fb>.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--red)\"><\u002Fspan>The AI-tells we cut<\u002Fh3>\n    <p class=\"sub\">Generated drafts lean on these. Find and replace them before anything ships.<\u002Fp>\n    <div class=\"dd\">\n      <div class=\"dd-card no\">\n        <div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Cut these<\u002Fdiv>\n        <p class=\"ex muted\">delve, unlock, elevate, leverage, harness, navigate the landscape, \"in today's fast-paced world\", \"it's important to note that\", \"more than ever\", \"the world of…\", \"let's dive in\", endless em-dashes, three-item lists of everything.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"dd-card do\">\n        <div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>Write instead<\u002Fdiv>\n        <p class=\"ex\">Say the concrete thing. \"Use\" not \"leverage\". \"Look at\" not \"delve into\". Open with the actual point, not a throat-clearing preamble. Vary your sentence rhythm.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--green)\"><\u002Fspan>Walls of text, fixed<\u002Fh3>\n    <div class=\"dd\">\n      <div class=\"dd-card no\">\n        <div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Wall of text<\u002Fdiv>\n        <p class=\"ex muted\">\"In order to effectively manage organisational change it is necessary to consider a multitude of factors including but not limited to stakeholder alignment, communication strategy, resource allocation, and the cultural readiness of the organisation, all of which must be carefully balanced…\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"dd-card do\">\n        <div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>Scannable<\u002Fdiv>\n        <p class=\"ex\">Managing change well comes down to four things:<\u002Fp>\n        <p class=\"ex\" style=\"margin-top:6px\">• Aligning stakeholders<br>• A clear communication plan<br>• The right resources<br>• A culture that's ready<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--purple)\"><\u002Fspan>House style quick reference<\u002Fh3>\n    <div class=\"grid cols-2\">\n      <div class=\"card\">\n        <h4 style=\"font-size:17px;margin-bottom:10px\">Spelling &amp; punctuation<\u002Fh4>\n        <p style=\"font-size:14.5px;color:var(--ink-soft);margin:0\">\n          UK / SA English: organi<b>s<\u002Fb>e, programme, colour, behaviour, centre.<br>\n          One space after full stops. Serial comma only to avoid ambiguity.<br>\n          Numbers: spell out one–nine, numerals from 10. Use R for rand (R5 000).<br>\n          Dates: 8 June 2026. Don't overuse em-dashes — a comma or full stop usually works.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4 style=\"font-size:17px;margin-bottom:10px\">Capitalisation<\u002Fh4>\n        <p style=\"font-size:14.5px;color:var(--ink-soft);margin:0\">\n          Title Case for course, module and page titles (Blackboard's Title style).<br>\n          Sentence case for Header, Subheader, body, buttons and labels.<br>\n          Use the heading levels in structural order; don't skip a level.<br>\n          \"GIBS\" is always all caps. Emphasis is <b>bold<\u002Fb>, never ALL CAPS.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     04 · COLOUR & TYPE\n     ============================================================ -->\n<section class=\"panel\" id=\"p-brand\" role=\"tabpanel\" aria-labelledby=\"t-brand\">\n  <div class=\"eyebrow\">From the GIBS CI guide<\u002Fdiv>\n  <h2>Colour &amp; type, applied.<\u002Fh2>\n  <p class=\"intro\">The palette and type system are fixed by the brand. Your job is to apply them consistently — and always with enough contrast to stay readable.<\u002Fp>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>Primary palette<\u002Fh3>\n    <p class=\"sub\">GIBS Blue leads. Black and white do the heavy lifting for text and space.<\u002Fp>\n    <div class=\"grid cols-3\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#002C77\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">GIBS Blue<\u002Fdiv><div class=\"use\">Primary — headings, structure, key UI<\u002Fdiv><div class=\"hex\">#002C77 · PMS 288C<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#111317\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Black<\u002Fdiv><div class=\"use\">Body text<\u002Fdiv><div class=\"hex\">#000000 · Process Black<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#fff;border-bottom:1px solid var(--line)\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">White<\u002Fdiv><div class=\"use\">Backgrounds, space<\u002Fdiv><div class=\"hex\">#FFFFFF<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--orange)\"><\u002Fspan>Programme &amp; accent palette<\u002Fh3>\n    <p class=\"sub\">Each programme category owns a colour. Use them to code sections and callouts — never decoratively, never two strong accents fighting in one view.<\u002Fp>\n    <div class=\"grid cols-4\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#326430\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Green<\u002Fdiv><div class=\"use\">Forums &amp; conferences<\u002Fdiv><div class=\"hex\">#326430<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#9BB33B\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Lime<\u002Fdiv><div class=\"use\">Masterclasses<\u002Fdiv><div class=\"hex\">#9BB33B<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#7B293D\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Maroon<\u002Fdiv><div class=\"use\">Online &amp; blended<\u002Fdiv><div class=\"hex\">#7B293D<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#9E191D\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Red<\u002Fdiv><div class=\"use\">Academic education<\u002Fdiv><div class=\"hex\">#9E191D<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#C9632F\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Orange<\u002Fdiv><div class=\"use\">Entrepreneurship<\u002Fdiv><div class=\"hex\">#C9632F<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#5C2F6F\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Purple<\u002Fdiv><div class=\"use\">Personal effectiveness<\u002Fdiv><div class=\"hex\">#5C2F6F<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#007378\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Teal<\u002Fdiv><div class=\"use\">Digitisation &amp; corporate<\u002Fdiv><div class=\"hex\">#007378<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#E4A024\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Yellow<\u002Fdiv><div class=\"use\">Marketing &amp; sales<\u002Fdiv><div class=\"hex\">#E4A024<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#E3D4B7\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Linen<\u002Fdiv><div class=\"use\">Neutral filler — sparingly<\u002Fdiv><div class=\"hex\">#E3D4B7<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#A4A9A8\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Grey<\u002Fdiv><div class=\"use\">Extended courses, dividers<\u002Fdiv><div class=\"hex\">#A4A9A8<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout warn\" style=\"margin-top:20px\">\n      <div class=\"glyph\">!<\u002Fdiv>\n      <div class=\"body\"><div class=\"ttl\">Contrast first<\u002Fdiv><p>Lime and Yellow are too light for white text or small text on white. Use them as fills behind dark text, or as accents — never as body-text colour. Check every pairing hits 4.5:1.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--teal)\"><\u002Fspan>Type system<\u002Fh3>\n    <p class=\"sub\">Two primary typefaces: <b>Jubilat<\u002Fb> for display, <b>Metric<\u002Fb> for body. Use their varying weights to build hierarchy and visual interest. Where the licensed fonts aren't available (most digital and MS-based applications), the GIBS secondary typeface <b>Arial<\u002Fb> is used to retain consistency. The examples below follow the <b>capitalisation convention<\u002Fb> — Title Case for the Title, sentence case for Header and Subheader.<\u002Fp>\n    <div class=\"card\">\n      <div class=\"type-spec\">\n        <div class=\"lbl\">TITLE / H1<br>Jubilat Bold<br><span style=\"color:var(--teal)\">Title Case<\u002Fspan><\u002Fdiv>\n        <div class=\"demo\"><div style=\"font-family:var(--slab);font-weight:700;font-size:40px;color:var(--blue);line-height:1.1\">Managing Team Conflict<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-spec\">\n        <div class=\"lbl\">HEADER / H2<br>Jubilat Bold<br><span style=\"color:var(--teal)\">sentence case<\u002Fspan><\u002Fdiv>\n        <div class=\"demo\"><div style=\"font-family:var(--slab);font-weight:600;font-size:28px;color:var(--blue)\">What you need to know first<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-spec\">\n        <div class=\"lbl\">SUBHEADER / H3<br>Jubilat Light<br><span style=\"color:var(--teal)\">sentence case<\u002Fspan><\u002Fdiv>\n        <div class=\"demo\"><div style=\"font-family:var(--slab);font-weight:300;font-size:21px;color:var(--blue)\">Apply this concept to your workplace<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-spec\">\n        <div class=\"lbl\">BODY<br>Metric Regular<\u002Fdiv>\n        <div class=\"demo\"><div style=\"font-size:17px;max-width:54ch\">Body copy is set in a humanist sans at 17px with generous line height, so a busy professional can read it comfortably on any screen. Never below 16px.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-spec\">\n        <div class=\"lbl\">EMPHASIS<br>Metric Semibold<\u002Fdiv>\n        <div class=\"demo\"><div style=\"font-size:17px\"><b>Bold<\u002Fb> for emphasis within body copy — never ALL CAPS or italics for stress.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-spec\">\n        <div class=\"lbl\">FALLBACK<br>Arial / Tahoma<\u002Fdiv>\n        <div class=\"demo\"><div style=\"font-family:Arial,sans-serif;font-size:16px;color:var(--ink-soft)\">Arial for digital &amp; MS documents; Tahoma for PowerPoint &amp; editable templates.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     05 · COMPONENTS\n     ============================================================ -->\n<section class=\"panel\" id=\"p-components\" role=\"tabpanel\" aria-labelledby=\"t-components\">\n  <div class=\"eyebrow\">Live, on-brand patterns<\u002Fdiv>\n  <h2>The component library.<\u002Fh2>\n  <p class=\"intro\">Build from these patterns rather than inventing new ones. Each example below is live and on-brand — copy the structure, swap the content, keep the behaviour. Everything here is keyboard-operable and meets contrast.<\u002Fp>\n\n  <!-- Callouts -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>Callout boxes<\u002Fh3>\n    <p class=\"sub\">Almost every GIBS course is built in Blackboard Ultra. Use Blackboard's four built-in callout boxes first — they're consistent, accessible and need no code. Build a custom callout only when none of the four fit.<\u002Fp>\n\n    <h4 class=\"subhead-min\">1 · Use Blackboard's native callouts first<\u002Fh4>\n    <div class=\"grid cols-2\">\n      <div class=\"bb-callout\" style=\"--c:#002C77\"><div class=\"bb-tag\">Question<\u002Fdiv><p>Pose a question, prompt reflection, or point learners to where they can ask for help.<\u002Fp><span class=\"bb-meta\">Blackboard native · blue<\u002Fspan><\u002Fdiv>\n      <div class=\"bb-callout\" style=\"--c:#E4A024\"><div class=\"bb-tag\" style=\"color:#8A5B00\">Tip<\u002Fdiv><p>A practical pointer, shortcut or piece of best practice from the field.<\u002Fp><span class=\"bb-meta\">Blackboard native · yellow<\u002Fspan><\u002Fdiv>\n      <div class=\"bb-callout\" style=\"--c:#5C2F6F\"><div class=\"bb-tag\">Key points<\u002Fdiv><p>Summarise the must-remember ideas at the end of a section.<\u002Fp><span class=\"bb-meta\">Blackboard native · purple<\u002Fspan><\u002Fdiv>\n      <div class=\"bb-callout\" style=\"--c:#326430\"><div class=\"bb-tag\">Next steps<\u002Fdiv><p>Tell learners what to do next, or how to progress through the module.<\u002Fp><span class=\"bb-meta\">Blackboard native · green<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout warn\" style=\"margin-top:18px\"><div class=\"glyph\">!<\u002Fdiv><div class=\"body\"><div class=\"ttl\">Keep the colour meaning consistent<\u002Fdiv><p>Always match the box to its purpose — blue for questions, yellow for tips, purple for key points, green for next steps — and use it the same way in every course.<\u002Fp><\u002Fdiv><\u002Fdiv>\n\n    <h4 class=\"subhead-min\" style=\"margin-top:36px\">2 · Custom callout — the GIBS HTML standard<\u002Fh4>\n    <p class=\"sub\" style=\"margin-bottom:16px\">When you need a type Blackboard doesn't offer — a note, a caution, a worked example — paste the snippet below into Blackboard's <b>&lt;/&gt; HTML view<\u002Fb> and replace the bracketed text. It's deliberately <b>icon-free<\u002Fb>: a coloured bar plus a bold text label carries the meaning reliably on every device and for screen-reader users, where icon fonts and emoji do not. Everything is inline-styled, so it renders correctly inside Blackboard without our stylesheet.<\u002Fp>\n\n    <div class=\"demo-frame\">\n      <div class=\"demo-label\">Live preview — exactly what the HTML below produces<\u002Fdiv>\n      <div role=\"note\" style=\"margin:0 0 14px;padding:16px 20px;background:#ffffff;border:1px solid #E4DCCF;border-left:6px solid #002C77;border-radius:8px;font-family:Arial,Helvetica,sans-serif;\">\n        <p style=\"margin:0 0 6px;font-size:14px;font-weight:bold;color:#002C77;\">Question<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6;color:#20242C;\">[Type your question or prompt here. Keep it to a few short sentences.]<\u002Fp>\n      <\u002Fdiv>\n      <div role=\"note\" style=\"margin:0 0 14px;padding:16px 20px;background:#ffffff;border:1px solid #E4DCCF;border-left:6px solid #E4A024;border-radius:8px;font-family:Arial,Helvetica,sans-serif;\">\n        <p style=\"margin:0 0 6px;font-size:14px;font-weight:bold;color:#8A5B00;\">Tip<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6;color:#20242C;\">[Type your practical pointer here.]<\u002Fp>\n      <\u002Fdiv>\n      <div role=\"note\" style=\"margin:0;padding:16px 20px;background:#ffffff;border:1px solid #E4DCCF;border-left:6px solid #9E191D;border-radius:8px;font-family:Arial,Helvetica,sans-serif;\">\n        <p style=\"margin:0 0 6px;font-size:14px;font-weight:bold;color:#9E191D;\">Caution<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6;color:#20242C;\">[Flag a common mistake or important caveat here.]<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"codewrap\">\n      <div class=\"codebar\"><span>Custom callout · paste into Blackboard's &lt;/&gt; HTML view<\u002Fspan><button class=\"btn-copy\" data-copy=\"cc-html\" data-label=\"Copy HTML\">Copy HTML<\u002Fbutton><\u002Fdiv>\n      <pre class=\"spec\" id=\"cc-html\">&lt;!-- GIBS custom callout — icon-free, inline styles. Swap the two colours + label per the table below. --&gt;\n&lt;div role=\"note\" style=\"margin:16px 0; padding:16px 20px; background:#ffffff; border:1px solid #E4DCCF; border-left:6px solid #002C77; border-radius:8px; font-family:Arial, Helvetica, sans-serif;\"&gt;\n  &lt;p style=\"margin:0 0 6px; font-size:14px; font-weight:bold; color:#002C77;\"&gt;[Label – e.g. Question]&lt;/p&gt;\n  &lt;p style=\"margin:0; font-size:16px; line-height:1.6; color:#20242C;\"&gt;[Type your text here. Keep it to a few short sentences.]&lt;/p&gt;\n&lt;/div&gt;<\u002Fpre>\n    <\u002Fdiv>\n\n    <p class=\"sub\" style=\"margin-top:18px\">To set the type, change the two colour values (the <b>border-left<\u002Fb> bar and the label colour) and the label text. Approved colours:<\u002Fp>\n    <table class=\"gibs\">\n      <caption>Approved accent colours for custom callouts.<\u002Fcaption>\n      <thead><tr><th scope=\"col\">Purpose<\u002Fth><th scope=\"col\">Bar colour<\u002Fth><th scope=\"col\">Label colour<\u002Fth><th scope=\"col\">Label text<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Question<\u002Ftd><td>#002C77<\u002Ftd><td>#002C77<\u002Ftd><td>Question<\u002Ftd><\u002Ftr>\n        <tr><td>Tip<\u002Ftd><td>#E4A024<\u002Ftd><td>#8A5B00 <span style=\"color:var(--grey)\">(darker for contrast)<\u002Fspan><\u002Ftd><td>Tip<\u002Ftd><\u002Ftr>\n        <tr><td>Key points<\u002Ftd><td>#5C2F6F<\u002Ftd><td>#5C2F6F<\u002Ftd><td>Key points<\u002Ftd><\u002Ftr>\n        <tr><td>Next steps<\u002Ftd><td>#326430<\u002Ftd><td>#326430<\u002Ftd><td>Next steps<\u002Ftd><\u002Ftr>\n        <tr><td>Note / aside<\u002Ftd><td>#007378<\u002Ftd><td>#007378<\u002Ftd><td>Note<\u002Ftd><\u002Ftr>\n        <tr><td>Caution<\u002Ftd><td>#9E191D<\u002Ftd><td>#9E191D<\u002Ftd><td>Caution<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"callout info\" style=\"margin-top:18px\"><div class=\"glyph\">i<\u002Fdiv><div class=\"body\"><div class=\"ttl\">Why no icons?<\u002Fdiv><p>Icon fonts and emoji don't render the same on every device, and most add no meaning for screen-reader users. A bold colour bar plus a clear text label tells everyone what the box is — and the meaning never relies on colour alone. Keep the label in sentence case and the body to a few short sentences.<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n\n  <hr class=\"rule\">\n\n  <!-- Pull quotes -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--lime)\"><\u002Fspan>Pull quotes<\u002Fh3>\n    <p class=\"sub\">For a genuinely memorable line or an expert voice — not to break up text. Set in Jubilat, GIBS Blue, with a Lime rule. Always attribute.<\u002Fp>\n    <div class=\"demo-frame\">\n      <div class=\"pquote\">\n        <p class=\"q\">Strategy is what you choose <em>not<\u002Fem> to do, as much as what you choose to do.<\u002Fp>\n        <div class=\"cite\">Prof. T. Mokoena<span>Faculty, Strategy &amp; Leadership<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dd\">\n      <div class=\"dd-card do\"><div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>Do<\u002Fdiv><p class=\"ex\">Use a short, quotable line. Keep it under ~20 words. Attribute every quote.<\u002Fp><\u002Fdiv>\n      <div class=\"dd-card no\"><div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Don't<\u002Fdiv><p class=\"ex\">Pull a whole paragraph, or use a quote as decoration where a callout belongs.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- Images & alt text -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--orange)\"><\u002Fspan>Images &amp; alt text<\u002Fh3>\n    <p class=\"sub\">Consistent sizing is non-negotiable — mismatched image dimensions are the fastest way to make a course look unfinished. Journalistic, warm, lightly desaturated photography (per the CI guide); people engaged and in conversation.<\u002Fp>\n    <div class=\"grid cols-3\">\n      <div><div class=\"imgph ratio-169\"><span class=\"tag\">16:9 · banner / header<\u002Fspan><\u002Fdiv><p style=\"font-size:13px;color:var(--ink-soft);margin:8px 0 0\">Module &amp; section headers. 1920×1080 source.<\u002Fp><\u002Fdiv>\n      <div><div class=\"imgph ratio-43\"><span class=\"tag\">4:3 · inline content<\u002Fspan><\u002Fdiv><p style=\"font-size:13px;color:var(--ink-soft);margin:8px 0 0\">In-flow supporting images. 1200×900.<\u002Fp><\u002Fdiv>\n      <div><div class=\"imgph ratio-11\"><span class=\"tag\">1:1 · avatar / icon<\u002Fspan><\u002Fdiv><p style=\"font-size:13px;color:var(--ink-soft);margin:8px 0 0\">Faculty, thumbnails. 600×600.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout info\" style=\"margin-top:20px\"><div class=\"glyph\">i<\u002Fdiv><div class=\"body\"><div class=\"ttl\">Sizing rule<\u002Fdiv><p>Pick the ratio by role and stick to it across the whole course. Same role = same dimensions, every time. Export at 2× for retina; compress to under 300&nbsp;KB.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <div class=\"dd\" style=\"margin-top:18px\">\n      <div class=\"dd-card do\"><div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>Good alt text<\u002Fdiv><p class=\"ex\">alt=\"Three colleagues reviewing a strategy map on a whiteboard, mid-discussion\"<\u002Fp><p class=\"ex\" style=\"font-size:13px;color:var(--ink-soft);margin-top:8px\">Describes what matters for the learning point. Decorative image? alt=\"\".<\u002Fp><\u002Fdiv>\n      <div class=\"dd-card no\"><div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Poor alt text<\u002Fdiv><p class=\"ex muted\">alt=\"image\" · alt=\"IMG_4821.jpg\" · alt=\"photo of people\" · <em>(missing entirely)<\u002Fem><\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- HTML interactives -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--purple)\"><\u002Fspan>HTML interactives<\u002Fh3>\n    <p class=\"sub\">Flip cards, accordions, and tabs. Use them to chunk content and invite engagement — never to hide essential information a learner needs in sequence. All three must work with a keyboard and screen reader.<\u002Fp>\n\n    <div class=\"demo-frame\">\n      <div class=\"demo-label\">Flip card — click or press Enter to reveal<\u002Fdiv>\n      <div class=\"grid cols-3\">\n        <div class=\"flip\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\" aria-label=\"Flip card: What is a stakeholder?\">\n          <div class=\"flip-inner\">\n            <div class=\"flip-face flip-front\"><div class=\"ttl\">What is a stakeholder?<\u002Fdiv><div class=\"hint\">CLICK TO FLIP<\u002Fdiv><\u002Fdiv>\n            <div class=\"flip-face flip-back\">Anyone affected by, or able to affect, a decision — inside or outside the organisation.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flip\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\" aria-label=\"Flip card: Define scope creep\">\n          <div class=\"flip-inner\">\n            <div class=\"flip-face flip-front\"><div class=\"ttl\">Define: scope creep<\u002Fdiv><div class=\"hint\">CLICK TO FLIP<\u002Fdiv><\u002Fdiv>\n            <div class=\"flip-face flip-back\">The gradual, unmanaged expansion of a project's goals beyond what was agreed.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flip\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\" aria-label=\"Flip card: Sunk cost\">\n          <div class=\"flip-inner\">\n            <div class=\"flip-face flip-front\"><div class=\"ttl\">Sunk cost<\u002Fdiv><div class=\"hint\">CLICK TO FLIP<\u002Fdiv><\u002Fdiv>\n            <div class=\"flip-face flip-back\">Money already spent and unrecoverable. It should not influence future decisions.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"demo-frame\">\n      <div class=\"demo-label\">Accordion — for layered or optional detail<\u002Fdiv>\n      <details class=\"acc\"><summary>When should I use an accordion?<span class=\"chev\">+<\u002Fspan><\u002Fsummary><div class=\"acc-body\"><p>For supplementary detail, FAQs, or optional deep-dives — content a learner can choose to expand. Keep essential, sequential learning visible by default.<\u002Fp><\u002Fdiv><\u002Fdetails>\n      <details class=\"acc\"><summary>How much goes in one panel?<span class=\"chev\">+<\u002Fspan><\u002Fsummary><div class=\"acc-body\"><p>A short paragraph or a tight list. If a panel runs long, it's probably its own section.<\u002Fp><\u002Fdiv><\u002Fdetails>\n      <details class=\"acc\"><summary>Is it accessible?<span class=\"chev\">+<\u002Fspan><\u002Fsummary><div class=\"acc-body\"><p>Built on native &lt;details&gt;/&lt;summary&gt;, so it's keyboard- and screen-reader-friendly out of the box. Prefer it over custom JavaScript toggles.<\u002Fp><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"demo-frame\">\n      <div class=\"demo-label\">Tabs — for parallel, comparable content<\u002Fdiv>\n      <div class=\"mtabs\">\n        <div class=\"mtabs-nav\" role=\"tablist\" aria-label=\"Example tabs\">\n          <button class=\"mtab\" role=\"tab\" aria-selected=\"true\" aria-controls=\"mt1\">Theory<\u002Fbutton>\n          <button class=\"mtab\" role=\"tab\" aria-selected=\"false\" aria-controls=\"mt2\">Example<\u002Fbutton>\n          <button class=\"mtab\" role=\"tab\" aria-selected=\"false\" aria-controls=\"mt3\">Apply<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"mtab-panel active\" id=\"mt1\" role=\"tabpanel\">The concept explained plainly, in one short paragraph the learner can grasp on first read.<\u002Fdiv>\n        <div class=\"mtab-panel\" id=\"mt2\" role=\"tabpanel\">A concrete, ideally South African or African, example that makes the concept real.<\u002Fdiv>\n        <div class=\"mtab-panel\" id=\"mt3\" role=\"tabpanel\">A prompt that asks the learner to apply the concept to their own organisation.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout warn\"><div class=\"glyph\">!<\u002Fdiv><div class=\"body\"><div class=\"ttl\">Interaction rule<\u002Fdiv><p>An interactive must add value, not just movement. If the same content reads fine as plain text, use plain text. Never put assessed or required content behind an optional interaction.<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- Headings & module structure -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--teal)\"><\u002Fspan>Headings &amp; module structure<\u002Fh3>\n    <p class=\"sub\">Every course follows the same rhythm, so learners never have to relearn the layout. Headings nest in order — never skip a level for visual effect.<\u002Fp>\n    <div class=\"grid cols-2\">\n      <div class=\"card\">\n        <h4 style=\"font-size:17px;margin-bottom:12px\">Heading hierarchy<\u002Fh4>\n        <div style=\"font-family:var(--mono);font-size:13px;line-height:1.95;color:var(--ink-soft)\">\n          <div><b style=\"color:var(--blue)\">Title<\u002Fb> (H1) — page title · <span style=\"color:var(--grey)\">Title Case<\u002Fspan><\u002Fdiv>\n          <div style=\"padding-left:18px\"><b style=\"color:var(--blue)\">Header<\u002Fb> (H2) — section · <span style=\"color:var(--grey)\">sentence case<\u002Fspan><\u002Fdiv>\n          <div style=\"padding-left:36px\"><b style=\"color:var(--blue)\">Subheader<\u002Fb> (H3) — subsection · <span style=\"color:var(--grey)\">sentence case<\u002Fspan><\u002Fdiv>\n          <div style=\"padding-left:54px\"><b style=\"color:var(--blue)\">Paragraph<\u002Fb> — body · <span style=\"color:var(--grey)\">sentence case<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;color:var(--ink-soft);margin:12px 0 0\">Use in order — never skip a level for visual effect.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4 style=\"font-size:17px;margin-bottom:12px\">Standard module flow<\u002Fh4>\n        <ol style=\"margin:0;padding-left:20px;font-size:15px;color:var(--ink-soft);line-height:1.9\">\n          <li><b style=\"color:var(--blue)\">Overview<\u002Fb> — what &amp; why, time to complete<\u002Fli>\n          <li><b style=\"color:var(--blue)\">Learning outcomes<\u002Fb> — what you'll be able to do<\u002Fli>\n          <li><b style=\"color:var(--blue)\">Content<\u002Fb> — sections, chunked<\u002Fli>\n          <li><b style=\"color:var(--blue)\">Activity / interaction<\u002Fb> — apply it<\u002Fli>\n          <li><b style=\"color:var(--blue)\">Summary<\u002Fb> — key takeaways &amp; next step<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- Learning outcomes -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--green)\"><\u002Fspan>Learning outcomes<\u002Fh3>\n    <p class=\"sub\">Backward design starts here. Write outcomes first, then build content that earns them. Measurable, observable verbs only.<\u002Fp>\n    <div class=\"card\">\n      <p style=\"font-family:var(--slab);font-weight:600;font-size:18px;color:var(--blue);margin-bottom:10px\">By the end of this module, you will be able to…<\u002Fp>\n      <p style=\"font-size:15.5px;margin:0\">…<b>analyse<\u002Fb> a stakeholder map to identify competing interests, and <b>recommend<\u002Fb> a sequencing strategy for a change initiative.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"dd\" style=\"margin-top:18px\">\n      <div class=\"dd-card do\"><div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>Measurable verbs<\u002Fdiv><p class=\"ex\">analyse · evaluate · design · apply · compare · recommend · build · diagnose<\u002Fp><\u002Fdiv>\n      <div class=\"dd-card no\"><div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>Vague / unmeasurable<\u002Fdiv><p class=\"ex muted\">understand · know · learn about · be aware of · appreciate · be familiar with<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- Tables -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--maroon)\"><\u002Fspan>Tables &amp; data<\u002Fh3>\n    <p class=\"sub\">Tables are for genuine comparison, not layout. Real header cells, a caption, and only the data that earns its place — no decorative numbers.<\u002Fp>\n    <div class=\"demo-frame\">\n      <table class=\"gibs\">\n        <caption>Table 1 — Choosing an interaction type by purpose.<\u002Fcaption>\n        <thead><tr><th scope=\"col\">Pattern<\u002Fth><th scope=\"col\">Best for<\u002Fth><th scope=\"col\">Avoid when<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Flip card<\u002Ftd><td>Term + definition, prompt + answer<\u002Ftd><td>Content must be read in order<\u002Ftd><\u002Ftr>\n          <tr><td>Accordion<\u002Ftd><td>Optional detail, FAQs<\u002Ftd><td>Essential, sequential learning<\u002Ftd><\u002Ftr>\n          <tr><td>Tabs<\u002Ftd><td>Parallel, comparable views<\u002Ftd><td>One continuous narrative<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- Video -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--yellow)\"><\u002Fspan>Video &amp; captions<\u002Fh3>\n    <p class=\"sub\">Captions and a transcript are mandatory — not optional extras. Video is 16:9, with a clear, plain-language title.<\u002Fp>\n    <div class=\"demo-frame\">\n      <div class=\"imgph ratio-169\" style=\"position:relative\"><span class=\"tag\">16:9 · video player<\u002Fspan>\n        <div style=\"position:absolute;bottom:14px;left:14px;background:rgba(17,19,23,.82);color:#fff;font-size:13px;padding:5px 12px;border-radius:6px\">Captions on by default — clear, accurate, synced<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <ul class=\"check-list\">\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Accurate closed captions<\u002Fb> on every video (WCAG 1.2.2). No auto-captions left unchecked.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<
