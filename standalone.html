\u002Fspan><div><b>A full text transcript<\u002Fb> available alongside the player.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>No essential info conveyed by audio alone.<\u002Fb> Key points also appear on screen or in text.<\u002Fdiv><\u002Fli>\n      <li><span class=\"box\">✓<\u002Fspan><div><b>Player controls are keyboard-operable<\u002Fb> and don't autoplay with sound.<\u002Fdiv><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     06 · ACCESSIBILITY\n     ============================================================ -->\n<section class=\"panel\" id=\"p-access\" role=\"tabpanel\" aria-labelledby=\"t-access\">\n  <div class=\"eyebrow\">UDL + WCAG 2.1 AA<\u002Fdiv>\n  <h2>Accessible by default.<\u002Fh2>\n  <p class=\"intro\">Accessibility isn't a final check — it's how we design from the first draft. Universal Design for Learning tells us to offer more than one way in; WCAG gives us the measurable baseline.<\u002Fp>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--teal)\"><\u002Fspan>The three UDL principles<\u002Fh3>\n    <p class=\"sub\">Build choice in. Different learners access, engage with, and demonstrate learning differently.<\u002Fp>\n    <div class=\"grid cols-3\">\n      <div class=\"udl\" style=\"background:var(--blue)\"><div class=\"n\">PRINCIPLE 01<\u002Fdiv><h4>Multiple means of representation<\u002Fh4><p>Offer content in more than one form — text, visual, audio, video — so the \"what\" of learning is reachable for everyone.<\u002Fp><\u002Fdiv>\n      <div class=\"udl\" style=\"background:var(--teal)\"><div class=\"n\">PRINCIPLE 02<\u002Fdiv><h4>Multiple means of engagement<\u002Fh4><p>Give learners reasons to care and ways to connect — relevant examples, choice, and the \"why\" of learning.<\u002Fp><\u002Fdiv>\n      <div class=\"udl\" style=\"background:var(--purple)\"><div class=\"n\">PRINCIPLE 03<\u002Fdiv><h4>Multiple means of action &amp; expression<\u002Fh4><p>Let learners show what they know in more than one way — the \"how\" of learning.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--green)\"><\u002Fspan>WCAG ship-checklist<\u002Fh3>\n    <p class=\"sub\">Run this against every asset before it goes into a course.<\u002Fp>\n    <div class=\"grid cols-2\">\n      <ul class=\"check-list\">\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Colour contrast ≥ 4.5:1<\u002Fb> for text (3:1 for large text &amp; UI).<span class=\"d\">Never use Lime or Yellow for text on white.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Alt text on every meaningful image;<\u002Fb> empty alt for decorative.<\u002Fdiv><\u002Fli>\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Headings in logical order<\u002Fb> — H1→H2→H3, never skipped.<\u002Fdiv><\u002Fli>\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Captions + transcript<\u002Fb> on all video and audio.<\u002Fdiv><\u002Fli>\n      <\u002Ful>\n      <ul class=\"check-list\">\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Everything works by keyboard<\u002Fb> — every interactive, in a logical tab order.<\u002Fdiv><\u002Fli>\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Meaning never by colour alone<\u002Fb> — pair it with text or an icon.<\u002Fdiv><\u002Fli>\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Descriptive link text<\u002Fb> — \"download the case study\", not \"click here\".<\u002Fdiv><\u002Fli>\n        <li><span class=\"box\">✓<\u002Fspan><div><b>Body text ≥ 16px<\u002Fb> and reflows without breaking when zoomed to 200%.<\u002Fdiv><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"callout reflect\" style=\"margin-top:20px\"><div class=\"glyph\">?<\u002Fdiv><div class=\"body\"><div class=\"ttl\">Quick gut-check<\u002Fdiv><p>Could a learner using only a keyboard, or only a screen reader, or with low vision, complete this exactly as intended? If you're not sure, it's not ready.<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     07 · AI ASSISTANT\n     ============================================================ -->\n<section class=\"panel\" id=\"p-ai\" role=\"tabpanel\" aria-labelledby=\"t-ai\">\n  <div class=\"eyebrow\">A GIBS standard<\u002Fdiv>\n  <h2>Every course has an AI study assistant.<\u002Fh2>\n  <p class=\"intro\">An embedded AI assistant is now part of the standard course build — a always-available study companion that helps learners check understanding, find content, and stay unstuck. It must feel like GIBS: warm, credible, and genuinely helpful.<\u002Fp>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>What it is — and isn't<\u002Fh3>\n    <div class=\"dd\">\n      <div class=\"dd-card do\"><div class=\"dd-tag\"><span class=\"ic\">✓<\u002Fspan>It should<\u002Fdiv><p class=\"ex\">Answer questions about the course content. Explain a concept another way. Point to the right module. Offer practice questions. Encourage a stuck learner.<\u002Fp><\u002Fdiv>\n      <div class=\"dd-card no\"><div class=\"dd-tag\"><span class=\"ic\">✕<\u002Fspan>It shouldn't<\u002Fdiv><p class=\"ex muted\">Do assessed work for the learner. Invent facts beyond the course. Replace faculty contact. Make decisions a human should own.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--lime)\"><\u002Fspan>Voice &amp; placement<\u002Fh3>\n    <div class=\"grid cols-2\" style=\"align-items:start\">\n      <div>\n        <ul class=\"check-list\">\n          <li><span class=\"box\">✓<\u002Fspan><div><b>Same warm, human voice<\u002Fb> as the rest of the course. The assistant is a colleague, not a chatbot.<\u002Fdiv><\u002Fli>\n          <li><span class=\"box\">✓<\u002Fspan><div><b>Persistent, predictable placement<\u002Fb> — same corner, every module.<\u002Fdiv><\u002Fli>\n          <li><span class=\"box\">✓<\u002Fspan><div><b>Clearly labelled as AI,<\u002Fb> with a note on what it can and can't do.<\u002Fdiv><\u002Fli>\n          <li><span class=\"box\">✓<\u002Fspan><div><b>Fully accessible<\u002Fb> — keyboard, screen reader, and readable contrast.<\u002Fdiv><\u002Fli>\n          <li><span class=\"box\">✓<\u002Fspan><div><b>Honest about limits<\u002Fb> — \"I'm not sure, here's who to ask\" beats a confident wrong answer.<\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"ai-mock\">\n        <div class=\"ai-head\">\n          <div class=\"avatar\">G<\u002Fdiv>\n          <div class=\"who\">GIBS Study Assistant<span>Here to help — not to grade<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ai-body\">\n          <div class=\"bub ai\">Hi — I can explain a concept, point you to the right section, or set you a quick practice question. What are you working on?<\u002Fdiv>\n          <div class=\"bub me\">Can you explain sunk cost simply?<\u002Fdiv>\n          <div class=\"bub ai\">Of course. A sunk cost is money you've already spent and can't get back. The key idea: don't let it drive future choices. Want a quick example from the case study?<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ai-foot\"><div class=\"inp\">Ask the assistant…<\u002Fdiv><div class=\"send\">→<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout warn\" style=\"margin-top:20px\"><div class=\"glyph\">!<\u002Fdiv><div class=\"body\"><div class=\"ttl\">Tone guardrail<\u002Fdiv><p>Warm, never cutesy. No emoji-spam, no exclamation pile-ups, no pretending to be human. Helpful and honest is the brand.<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     08 · TOOLKIT\n     ============================================================ -->\n<section class=\"panel\" id=\"p-toolkit\" role=\"tabpanel\" aria-labelledby=\"t-toolkit\">\n  <div class=\"eyebrow\">Working tools, not just rules<\u002Fdiv>\n  <h2>The toolkit.<\u002Fh2>\n  <p class=\"intro\">Two helpers that put this guide to work. Both run entirely in your browser — nothing is sent anywhere, so they work offline and on any host.<\u002Fp>\n\n  <!-- ===== Spelling troubleshooter ===== -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--blue)\"><\u002Fspan>UK / SA spelling troubleshooter<\u002Fh3>\n    <p class=\"sub\">Paste a word, sentence, or paragraph. It flags US spellings and suggests the GIBS UK/SA form — and quietly points out a few jargon and AI-tells while it's at it.<\u002Fp>\n    <div class=\"tool\">\n      <div class=\"tool-hd\"><h4>Check my spelling<\u002Fh4><span class=\"tag-mono\">UK / SA English<\u002Fspan><\u002Fdiv>\n      <p class=\"tool-note\">A rules-and-dictionary check for the common US→UK/SA differences (‑ize→‑ise, color→colour, center→centre, program→programme, and more). It won't catch every word — treat it as a fast first pass, not a replacement for proofreading.<\u002Fp>\n      <label class=\"field-label\" for=\"sp-in\">Your text<\u002Flabel>\n      <textarea class=\"t-area\" id=\"sp-in\" placeholder=\"e.g. Our organization will finalize the color of the program center…\"><\u002Ftextarea>\n      <div class=\"try-chips\">\n        <span>Try:<\u002Fspan>\n        <button class=\"chip-btn\" data-try=\"Our organization will finalize the color of the program center.\">a sample sentence<\u002Fbutton>\n        <button class=\"chip-btn\" data-try=\"colour\">colour<\u002Fbutton>\n        <button class=\"chip-btn\" data-try=\"analyze\">analyze<\u002Fbutton>\n        <button class=\"chip-btn\" data-try=\"We must leverage synergies to optimize the catalog.\">jargon test<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"btn-row\">\n        <button class=\"btn btn-primary\" id=\"sp-go\">Check spelling<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"sp-clear\">Clear<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"sp-result\" aria-live=\"polite\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- ===== Approved-word register ===== -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--green)\"><\u002Fspan>GIBS approved words<\u002Fh3>\n    <p class=\"sub\">Some words are correct in more than one form — \"self-reflection\" and \"self reflection\" are both valid UK/SA spelling. To keep courses consistent, GIBS picks one. Add the preferred forms here and the spelling troubleshooter will flag the others and suggest the GIBS form.<\u002Fp>\n    <div class=\"tool\">\n      <div class=\"tool-hd\"><h4>Approved-word register<\u002Fh4><span class=\"tag-mono\">House style<\u002Fspan><\u002Fdiv>\n      <p class=\"tool-note\">Saved in your browser. To share one canonical list across the team, export it and commit it with the guide — everyone then gets the same list on the next deploy.<\u002Fp>\n      <table class=\"gibs\" id=\"aw-table\">\n        <caption>Preferred GIBS spellings and the variants to avoid.<\u002Fcaption>\n        <thead><tr><th scope=\"col\">Use this<\u002Fth><th scope=\"col\">Instead of<\u002Fth><th scope=\"col\">Note<\u002Fth><th scope=\"col\" style=\"width:44px\"><span class=\"sr-only\">Remove<\u002Fspan><\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody id=\"aw-body\"><\u002Ftbody>\n      <\u002Ftable>\n      <div class=\"aw-add\">\n        <input class=\"t-input\" id=\"aw-pref\" placeholder=\"Preferred, e.g. self-reflection\" aria-label=\"Preferred form\">\n        <input class=\"t-input\" id=\"aw-avoid\" placeholder=\"Avoid, e.g. self reflection\" aria-label=\"Form to avoid\">\n        <input class=\"t-input\" id=\"aw-note\" placeholder=\"Note (optional)\" aria-label=\"Note\">\n        <button class=\"btn btn-primary\" id=\"aw-add\">Add<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"btn-row\">\n        <button class=\"btn btn-ghost\" id=\"aw-export\">Export list (JSON)<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"aw-import-btn\">Import list…<\u002Fbutton>\n        <input type=\"file\" id=\"aw-import\" accept=\"application/json,.json\" hidden=\"\">\n        <button class=\"btn btn-ghost\" id=\"aw-reset\">Reset to defaults<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"pm-note\" style=\"margin-top:6px\"><b>Sharing across the team ·<\u002Fb> Until the guide has a shared backend, the reliable way to keep one list is to export the JSON, commit it alongside the guide, and re-deploy. I can wire that up for you.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- ===== Reword with AI ===== -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--maroon)\"><\u002Fspan>Reword with AI<\u002Fh3>\n    <p class=\"sub\">Paste a paragraph and have it rewritten to GIBS conventions — active voice, plain language, UK/SA spelling, our number rule. Runs through a secure GIBS endpoint; your text isn't stored.<\u002Fp>\n    <div class=\"tool\">\n      <div class=\"tool-hd\"><h4>Reword a paragraph<\u002Fh4><span class=\"tag-mono\">Beta · needs setup<\u002Fspan><\u002Fdiv>\n      <p class=\"tool-note\">This calls a Netlify Function that holds the GIBS Anthropic key. If you see a \"not connected\" message, the function still needs to be deployed (see the setup steps).<\u002Fp>\n      <label class=\"field-label\">What should it do?<\u002Flabel>\n      <div class=\"seg\" id=\"rw-seg\" role=\"group\" aria-label=\"Reword mode\">\n        <button class=\"opt\" data-mode=\"active\" aria-pressed=\"true\">Make active<\u002Fbutton>\n        <button class=\"opt\" data-mode=\"plain\" aria-pressed=\"false\">Plain language<\u002Fbutton>\n        <button class=\"opt\" data-mode=\"concise\" aria-pressed=\"false\">Shorten<\u002Fbutton>\n        <button class=\"opt\" data-mode=\"gibs\" aria-pressed=\"false\">Apply all GIBS conventions<\u002Fbutton>\n      <\u002Fdiv>\n      <label class=\"field-label\" for=\"rw-in\" style=\"margin-top:16px\">Your text<\u002Flabel>\n      <textarea class=\"t-area\" id=\"rw-in\" placeholder=\"Paste a paragraph to reword…\"><\u002Ftextarea>\n      <div class=\"btn-row\">\n        <button class=\"btn btn-primary\" id=\"rw-go\">Reword<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"rw-clear\">Clear<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"rw-result\" aria-live=\"polite\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <!-- ===== Idea generator ===== -->\n  <div class=\"section\">\n    <h3><span class=\"dot\" style=\"background:var(--purple)\"><\u002Fspan>HTML interactive idea generator<\u002Fh3>\n    <p class=\"sub\">Tell it what you want learners to do. It suggests an interaction pattern with its UDL rationale and a WCAG checklist tailored to that pattern — so accessibility is baked in from the idea stage.<\u002Fp>\n    <div class=\"tool\">\n      <div class=\"tool-hd\"><h4>Generate an idea<\u002Fh4><span class=\"tag-mono\">UDL + WCAG 2.1 AA<\u002Fspan><\u002Fdiv>\n      <p class=\"tool-note\">Pick a learning intent and, if you like, narrow by a UDL principle. Each idea comes with why it works and how to build it accessibly.<\u002Fp>\n\n      <label class=\"field-label\">1 · What do you want learners to do?<\u002Flabel>\n      <div class=\"seg\" id=\"intent-seg\" role=\"group\" aria-label=\"Learning intent\">\n        <button class=\"opt\" data-intent=\"recall\" aria-pressed=\"true\">Recall &amp; define<\u002Fbutton>\n        <button class=\"opt\" data-intent=\"compare\" aria-pressed=\"false\">Compare &amp; contrast<\u002Fbutton>\n        <button class=\"opt\" data-intent=\"apply\" aria-pressed=\"false\">Apply to a scenario<\u002Fbutton>\n        <button class=\"opt\" data-intent=\"sequence\" aria-pressed=\"false\">Sequence a process<\u002Fbutton>\n        <button class=\"opt\" data-intent=\"explore\" aria-pressed=\"false\">Explore &amp; discover<\u002Fbutton>\n        <button class=\"opt\" data-intent=\"reflect\" aria-pressed=\"false\">Reflect &amp; self-assess<\u002Fbutton>\n        <button class=\"opt\" data-intent=\"check\" aria-pressed=\"false\">Check understanding<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"gen-controls\">\n        <div>\n          <label class=\"field-label\" for=\"udl-filter\">2 · UDL emphasis (optional)<\u002Flabel>\n          <select class=\"t-select\" id=\"udl-filter\">\n            <option value=\"any\">Any UDL principle<\u002Foption>\n            <option value=\"representation\">Multiple means of representation<\u002Foption>\n            <option value=\"engagement\">Multiple means of engagement<\u002Foption>\n            <option value=\"action\">Multiple means of action &amp; expression<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"btn-row\" style=\"margin-top:0\">\n          <button class=\"btn btn-primary\" id=\"gen-go\">Generate idea<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"idea-out\" aria-live=\"polite\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- AI build-prompt pop-out -->\n<div class=\"modal-backdrop\" id=\"prompt-modal\" hidden=\"\">\n  <div class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"pm-title\">\n    <header>\n      <div>\n        <h3 id=\"pm-title\">AI build prompt<\u002Fh3>\n        <span class=\"pm-sub\" id=\"pm-sub\">Ready to paste into your AI tool<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"modal-x\" id=\"pm-close\" aria-label=\"Close prompt\">×<\u002Fbutton>\n    <\u002Fheader>\n    <div class=\"modal-body\">\n      <p class=\"muted\">Pick the tool you'll build with, then copy the prompt. It already includes the GIBS brand, UDL and WCAG requirements for this interaction — just fill in your topic and content where shown in [BRACKETS].<\u002Fp>\n      <label class=\"field-label\">Which tool are you using?<\u002Flabel>\n      <div class=\"seg\" id=\"tool-seg\" role=\"group\" aria-label=\"AI tool\">\n        <button class=\"opt\" data-tool=\"claude-code\" aria-pressed=\"true\">Claude Code<\u002Fbutton>\n        <button class=\"opt\" data-tool=\"chat\" aria-pressed=\"false\">Claude / ChatGPT<\u002Fbutton>\n        <button class=\"opt\" data-tool=\"editor\" aria-pressed=\"false\">Cursor / Copilot<\u002Fbutton>\n      <\u002Fdiv>\n      <label class=\"field-label\" for=\"pm-text\" style=\"margin-top:18px\">Your prompt<\u002Flabel>\n      <textarea class=\"t-area\" id=\"pm-text\" readonly=\"\" spellcheck=\"false\"><\u002Ftextarea>\n      <div class=\"btn-row\">\n        <button class=\"btn btn-primary\" id=\"pm-copy\">Copy prompt<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"pm-close2\">Close<\u002Fbutton>\n        <span id=\"pm-copied\" aria-live=\"polite\">Copied ✓<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pm-note\"><b>How to use&nbsp;·<\u002Fb> Paste into your tool, replace the [BRACKETED] placeholders with your real topic and content, and ask it to build. When it's done, run it through the WCAG checklist in this guide before adding it to your course.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fmain>\n\n<!-- Team notes (per-tab) -->\n<button class=\"notes-fab\" id=\"notes-fab\" hidden=\"\" aria-expanded=\"false\">Notes<span class=\"notes-count\" id=\"notes-count\" hidden=\"\">0<\u002Fspan><\u002Fbutton>\n<div class=\"notes-drawer\" id=\"notes-drawer\" hidden=\"\" role=\"dialog\" aria-label=\"Team notes\">\n  <div class=\"notes-hd\">\n    <div>\n      <div class=\"notes-title\">Team notes<\u002Fdiv>\n      <div class=\"notes-sub\" id=\"notes-tab-label\">This page<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"modal-x\" id=\"notes-close\" aria-label=\"Close notes\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"notes-list\" id=\"notes-list\"><\u002Fdiv>\n  <form class=\"notes-form\" id=\"notes-form\">\n    <div class=\"notes-row\">\n      <input class=\"t-input\" id=\"note-name\" placeholder=\"Your name\" aria-label=\"Your name\">\n      <select class=\"t-select\" id=\"note-kind\" aria-label=\"Note type\">\n        <option value=\"question\">Question<\u002Foption>\n        <option value=\"suggestion\">Suggestion<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <textarea class=\"t-area\" id=\"note-text\" placeholder=\"Add a question or suggestion about this page…\" aria-label=\"Your note\"><\u002Ftextarea>\n    <input class=\"t-input\" id=\"note-pass\" type=\"password\" placeholder=\"Team passcode\" aria-label=\"Team passcode\">\n    <div class=\"notes-actions\">\n      <button type=\"submit\" class=\"btn btn-primary\" id=\"note-post\">Post note<\u002Fbutton>\n      <span id=\"note-msg\" aria-live=\"polite\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fform>\n<\u002Fdiv>\n\n<footer class=\"footer\">\n  <div><b>GIBS Brand &amp; Content Style Guide<\u002Fb> · for the Instructional Design team · v1.0<\u002Fdiv>\n  <div>Globally accredited, proudly African. · Last updated June 2026<\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"b5b09afc-e4bd-42ee-923e-7ad423e8f3af\"><\u002Fscript>\n<script src=\"a207952a-9583-4f3d-b13f-e019b0680571\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
